---
actions:
  - !writeStatus: {status: 'Finalizing'} 
  - !appx: {operation: clearCache, name: '*Client.CBS*'}
  - !appx: {operation: clearCache, name: '*StartMenuExperienceHost*'}
  - !appx: {operation: clearCache, name: '*Windows.Search*'}
  - !appx: {operation: clearCache, name: '*TCUI*'}
  - !powerShell: {command: '.\WALLPAPER.ps1 -Mode Desktop -ImagePath $env:systemroot\Web\Akari\img0.jpg', exeDir: true, runas: currentUserElevated}
  - !writeStatus: {status: 'Tweaking PowerPlan'}
  - !run:
    exeDir: true
    exe: "powerplan.bat"
  - !run: {exe: 'DISM.exe', args: '/Online /set-reservedstoragestate /state:disabled'}
