#disable fault tolerant heap
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\FTH', value: Enabled, type: REG_DWORD, data: '0'}
#disable powershell telemetry
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Session Manager\Environment', value: POWERSHELL_TELEMETRY_OPTOUT, type: REG_SZ, data: '1'}
#disable pointer acceleration
