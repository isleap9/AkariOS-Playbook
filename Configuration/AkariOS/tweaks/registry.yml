---
actions:
  - !writeStatus: {status: 'Applying Registry Tweaks'}
      
#oeminfo

  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation', value: 'Manufacturer', type: REG_SZ, data: 'Hickensa'}
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation', value: 'Model', type: REG_SZ, data: 'Akari'}
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion', value: 'EditionSubVersion', type: REG_SZ, data: 'Akari'}
#telemetry
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\DataCollection', value: AllowTelemetry, type: REG_DWORD, data: '0'}
#disable online tips
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer', value: AllowOnlineTips, type: REG_DWORD, data: '0'}
#disable typing insights
  - !registryValue: {path: 'HKEY_CURRENT_USER\SOFTWARE\Microsoft\input\Settings', value: InsightsEnabled, type: REG_DWORD, data: '0'}
#disable automatic maintenance
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Schedule\Maintenance', value: MaintenanceDisabled, type: REG_DWORD, data: '1'}
#Disable Fault Tolerant heap
  - !run: {exe: 'rundll32.exe', args: 'fthsvc.dll,FthSysprepSpecialize'}
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\FTH', value: 'Enabled', data: '0', type: REG_DWORD}
#Win32PrioritySeparation
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\PriorityControl', value: Win32PrioritySeparation, type: REG_DWORD, data: '42'}
  - !registryValue: {path: 'HKEY_CURRENT_USER\SOFTWARE\AkariTool', value: Win32PrioritySeparation, type: REG_DWORD, data: '42'}
#prevent windows marking file attachments with information about their zone of origin
  - !registryValue: {path: 'HKEY_CURRENT_USER\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Attachments', value: SaveZoneInformation, type: REG_DWORD, data: '1'}
#disable customer experience improvement program
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\SQMClient\Windows', value: CEIPEnable, type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\SQMClient\Windows', value: CEIPEnable, type: REG_DWORD, data: '0'}
