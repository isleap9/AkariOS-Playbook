<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>AkariOS</Name>
    <Username>Akari</Username>
    <Title>AkariOS</Title>
    <ShortDescription>Playbook for Windows 10 and 11</ShortDescription>
    <Description>The Playbook for AkariOS</Description>
    <Version>4.2.0</Version>
    <SupportedBuilds>
        <string>19044</string>
        <string>19045</string>
        <string>22621</string>
        <string>22631</string>
        <string>26100</string>
        <string>26200</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>DefenderToggled</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>Internet</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <UseKernelDriver>false</UseKernelDriver>
	    <FeaturePages>
        <CheckboxPage IsRequired="true" Description="Security configuration">
            <Options>
			    <CheckboxOption IsChecked="true">
                    <Text>Disable Windows Defender</Text>
                    <Name>disable-defender</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable User Account Control</Text>
                    <Name>disable-uac</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Process Mitigations</Text>
                    <Name>disable-process-mitigations</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Spectre And Meltdown</Text>
                    <Name>disable-spectre-meltdown</Name>
				</CheckboxOption>
            </Options>
		</CheckboxPage>
        <CheckboxPage IsRequired="true" Description="Please configure these Windows settings to your liking. (1/2)">
            <Options>
                <CheckboxOption IsChecked="false">
                    <Text>Dark Mode</Text>
                    <Name>enable-dark-mode</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable VPN Services</Text>
                    <Name>disable-vpn</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Legacy Context Menu For Windows 11</Text>
                    <Name>legacy-context-menu</Name>
				</CheckboxOption>	
                <CheckboxOption IsChecked="false">
                    <Text>Legacy Photo Viewer</Text>
                    <Name>remove-uwp-photos</Name>
				</CheckboxOption>
            </Options>
		</CheckboxPage>
        <CheckboxPage IsRequired="true" Description="Please configure these Windows settings to your liking. (2/2)">
           <Options>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Printer</Text>
                    <Name>disable-print</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Bluetooth</Text>
                    <Name>disable-bluetooth</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Windows Update</Text>
                    <Name>disable-wu</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Extra Power Savings</Text>
                    <Name>disable-powersave</Name>
				</CheckboxOption>
           </Options>
		</CheckboxPage>
		<CheckboxPage IsRequired="true" Description="Untick what you would like to keep.">
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Remove Microsoft Edge</Text>
                    <Name>remove-edge</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Remove OneDrive</Text>
                    <Name>remove-onedrive</Name>
				</CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Hyper-V and VBS</Text>
                    <Name>disable-hyperv</Name>
				</CheckboxOption>                
				<CheckboxOption IsChecked="false">
                    <Text>Install Open-Shell</Text>
                    <Name>openshell</Name>
				</CheckboxOption>
            </Options>
		</CheckboxPage>
		</FeaturePages>
</Playbook>
